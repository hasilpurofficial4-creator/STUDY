<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Request - Study Hub Lahore</title>
  <meta name="theme-color" content="#fbbf24">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('shl_theme') || 'dark');</script>
</head>
<body>
  <div class="bg-blobs"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>
  <div class="app-container">
    <header class="app-header">
      <div class="header-brand">
        <a href="index.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:12px">
          <div class="header-logo" style="background:linear-gradient(135deg,#fbbf24,#f59e0b)">SH</div>
          <div>
            <div class="header-title">Study Hub <span>Lahore</span></div>
            <div class="header-subtitle">Submit Request</div>
          </div>
        </a>
      </div>
      <div class="header-actions">
        <span id="header-datetime"></span>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
      </div>
    </header>

    <main class="main-content">
      <div class="login-container">
        <div class="login-card" style="max-width:500px">
          <div class="login-icon" style="background:linear-gradient(135deg,#fbbf24,#f59e0b)">📩</div>
          <h2 class="login-title">Submit a Request</h2>
          <p class="login-subtitle">Need access or have a question? Let us know!</p>
          <form class="login-form" id="request-form">
            <div class="form-group">
              <label class="form-label">Your Name</label>
              <input type="text" class="form-input" id="req-name" placeholder="Full name" required>
            </div>
            <div class="form-group">
              <label class="form-label">Phone Number</label>
              <input type="tel" class="form-input" id="req-number" placeholder="e.g. 03XX-XXXXXXX" required>
            </div>
            <div class="form-group">
              <label class="form-label">Your Request</label>
              <textarea class="form-textarea" id="req-text" placeholder="Describe your request..." required></textarea>
            </div>
            <button type="submit" class="btn btn-lg" style="width:100%;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000">Submit Request</button>
          </form>
          <div id="success-msg" class="hidden text-center mt-2">
            <p style="font-size:3rem">✅</p>
            <h3>Request Submitted!</h3>
            <p class="text-muted">We'll get back to you soon.</p>
            <a href="index.html" class="btn btn-outline mt-1">← Back to Home</a>
          </div>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      Study Hub Lahore &copy; 2024 &mdash; <a href="index.html">Home</a>
    </footer>
  </div>
  <script type="module" src="js/pages/request.js"></script>
</body>
</html>
