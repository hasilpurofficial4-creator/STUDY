<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Portal - Study Hub Lahore</title>
  <meta name="theme-color" content="#38bdf8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('shl_theme') || 'dark');</script>
</head>
<body>
  <div class="bg-blobs"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>
  <div class="app-container">
    <header class="app-header">
      <div class="header-brand">
        <a href="index.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:12px">
          <div class="header-logo" style="background:linear-gradient(135deg,#38bdf8,#0ea5e9)">SH</div>
          <div>
            <div class="header-title">Study Hub <span>Lahore</span></div>
            <div class="header-subtitle">Teacher Portal</div>
          </div>
        </a>
      </div>
      <div class="header-actions">
        <span id="header-datetime"></span>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
        <span id="user-badge" class="badge badge-info hidden"></span>
        <button id="logout-btn" class="btn btn-ghost btn-sm hidden">Logout</button>
      </div>
    </header>

    <main class="main-content">
      <!-- Login -->
      <div id="login-section" class="login-container">
        <div class="login-card">
          <div class="login-icon" style="background:linear-gradient(135deg,#38bdf8,#0ea5e9)">👨‍🏫</div>
          <h2 class="login-title">Teacher Login</h2>
          <p class="login-subtitle">Sign in to create and manage exams</p>
          <form class="login-form" id="login-form">
            <div class="form-group">
              <label class="form-label">Username</label>
              <input type="text" class="form-input" id="login-user" placeholder="Enter username" required>
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" class="form-input" id="login-pass" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;background:linear-gradient(135deg,#38bdf8,#0ea5e9)">Sign In</button>
          </form>
        </div>
      </div>

      <!-- Dashboard -->
      <div id="dashboard-section" class="hidden">
        <div class="flex justify-between items-center mb-1">
          <h2 class="features-title" style="margin:0">Teacher Dashboard</h2>
          <button class="btn btn-primary" id="new-exam-btn">+ Create New Exam</button>
        </div>

        <!-- Create Exam Form -->
        <div id="create-exam-section" class="glass-card mt-2 hidden animate-fadeInUp">
          <h3 style="margin-bottom:var(--space-lg)">Create MCQ Exam</h3>
          <form id="exam-form">
            <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:var(--space-md)">
              <div class="form-group">
                <label class="form-label">Class</label>
                <select class="form-select" id="exam-class" required>
                  <option value="">Select Class</option>
                  <option>1st</option><option>2nd</option><option>3rd</option><option>4th</option>
                  <option>5th</option><option>6th</option><option>7th</option><option>8th</option>
                  <option>9th</option><option>10th</option><option>11th</option><option>12th</option>
                  <option>University</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Subject</label>
                <input type="text" class="form-input" id="exam-subject" placeholder="e.g. Mathematics" required>
              </div>
              <div class="form-group">
                <label class="form-label">Number of Questions</label>
                <input type="number" class="form-input" id="exam-numq" min="1" max="100" value="10" required>
              </div>
              <div class="form-group">
                <label class="form-label">Time (minutes)</label>
                <input type="number" class="form-input" id="exam-time" min="1" value="30" required>
              </div>
              <div class="form-group">
                <label class="form-label">Total Marks</label>
                <input type="number" class="form-input" id="exam-marks" min="1" value="100" required>
              </div>
              <div class="form-group">
                <label class="form-label">Passing Percentage</label>
                <input type="number" class="form-input" id="exam-passpct" min="1" max="100" value="50" required>
              </div>
            </div>

            <div id="questions-container" class="mt-2"></div>
            <button type="button" class="btn btn-outline mt-1" id="generate-qs-btn">Generate Question Fields</button>

            <div class="flex justify-between mt-2">
              <button type="button" class="btn btn-ghost" id="cancel-exam-btn">Cancel</button>
              <button type="submit" class="btn btn-success btn-lg" id="save-exam-btn" disabled>Save Exam</button>
            </div>
          </form>
        </div>

        <!-- My Exams -->
        <div class="mt-3">
          <h3 class="features-title">My Created Exams</h3>
          <div id="my-exams-list"></div>
        </div>

        <!-- Student Results -->
        <div class="mt-3">
          <h3 class="features-title">Student Results</h3>
          <div id="student-results-list"></div>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      Study Hub Lahore &copy; 2024 &mdash; <a href="index.html">Home</a>
    </footer>
  </div>
  <script type="module" src="js/pages/teacher.js"></script>
</body>
</html>
